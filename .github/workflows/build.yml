name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev automake libtool-bin python3-dev
    
    - name: Set JAVA_HOME
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH
    
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.33
    
    - name: Install Android SDK and accept licenses
      run: |
        # Create Android SDK directory
        mkdir -p ~/Android/Sdk/cmdline-tools
        
        # Download command-line tools
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip
        mkdir -p ~/Android/Sdk/cmdline-tools/latest
        mv cmdline-tools/* ~/Android/Sdk/cmdline-tools/latest/ 2>/dev/null || true
        
        # Set environment variables
        echo "ANDROID_HOME=~/Android/Sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=~/Android/Sdk" >> $GITHUB_ENV
        echo "$HOME/Android/Sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$HOME/Android/Sdk/platform-tools" >> $GITHUB_PATH
        
        # Accept all licenses
        yes | ~/Android/Sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # Install required SDK components
        ~/Android/Sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
    
    - name: Debug - List files
      run: |
        echo "=== Current directory files ==="
        ls -la
        echo "=== buildozer.spec content ==="
        cat buildozer.spec
    
    - name: Build APK
      run: |
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 1
    
    - name: List build artifacts
      if: always()
      run: |
        echo "=== Checking for APK files ==="
        ls -la bin/ 2>/dev/null || echo "bin/ directory not found"
        find . -name "*.apk" -type f 2>/dev/null
    
    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: health-monitor-apk
        path: bin/*.apk
        retention-days: 90
