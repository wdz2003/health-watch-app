name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev automake libtool-bin python3-dev
    
    - name: Set JAVA_HOME
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH
    
    - name: Install Buildozer and dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython==0.29.33
        buildozer version
    
    - name: Accept Android SDK licenses
      run: |
        yes | sdkmanager --licenses || true
    
    - name: Initialize buildozer (first time)
      run: |
        buildozer init
      continue-on-error: true
    
    - name: Build APK
      run: |
        buildozer android debug
      continue-on-error: true
    
    - name: Check if APK was created
      run: |
        ls -la bin/
        find . -name "*.apk" -type f
      continue-on-error: true
    
    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: health-monitor-apk
        path: bin/*.apk
        retention-days: 90
      continue-on-error: true
    
    - name: Build summary
      if: always()
      run: |
        echo "## 构建完成" >> $GITHUB_STEP_SUMMARY
        echo "- 构建时间: $(date)" >> $GITHUB_STEP_SUMMARY
        if [ -f bin/*.apk ]; then
          echo "- APK 文件: $(ls -lh bin/*.apk)" >> $GITHUB_STEP_SUMMARY
        else
          echo "- APK 文件: 未找到" >> $GITHUB_STEP_SUMMARY
        fi
